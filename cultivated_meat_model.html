function sampleFromDist(p5, median, p95, rng) {
  const u = rng();
  if (u < 0.05) {
    const t = u / 0.05;
    const lower = Math.max(0, p5 - (median - p5));
    return lower + t * (p5 - lower);
  } else if (u < 0.5) {
    const t = (u - 0.05) / 0.45;
    return p5 + t * (median - p5);
  } else if (u < 0.95) {
    const t = (u - 0.5) / 0.45;
    return median + t * (p95 - median);
  } else {
    const t = (u - 0.95) / 0.05;
    const upper = Math.min(100, p95 + (p95 - median));
    return p95 + t * (upper - p95);
  }
}

function mulberry32(seed) {
  let s = seed | 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function runMonteCarlo(aiDists, sensitivities, scalingFactor, baselines) {
  const rng = mulberry32(42);
  const samples = {};
  BOTTLENECKS.forEach(b => { samples[b.id] = []; });
  for (let i = 0; i < MC_DRAWS; i++) {
    const draws = {};
    META_IDS.forEach(m => {
      const d = aiDists[m];
      draws[m] = sampleFromDist(d.p5, d.median, d.p95, rng);
    });
    BOTTLENECKS.forEach(b => {
      const s = sensitivities[b.id];
      let aiContrib = 0;
      META_IDS.forEach(m => {
        const v = draws[m];
        const sensitivity = s[m] || 0;
        const median = aiDists[m].median;
        const p95 = aiDists[m].p95;
        let multiplier = 1;
        if (p95 !== median && sensitivity > 0) {
          multiplier = 1 + scalingFactor * (v - median) / (p95 - median);
          multiplier = Math.max(0.1, multiplier);
        }
        aiContrib += (v / 100) * sensitivity * multiplier * 100;
      });
      const total = Math.min(100, baselines[b.id] + aiContrib);
      samples[b.id].push({ ai: aiContrib, total });
    });
  }
  const results = {};
  BOTTLENECKS.forEach(b => {
    const aiVals = samples[b.id].map(s => s.ai).sort((a, c) => a - c);
    const totVals = samples[b.id].map(s => s.total).sort((a, c) => a - c);
    const p = (arr, pct) => arr[Math.floor(pct / 100 * (arr.length - 1))];
    results[b.id] = {
      aiP5: Math.round(p(aiVals, 5)),
      aiMedian: Math.round(p(aiVals, 50)),
      aiP95: Math.round(p(aiVals, 95)),
      totalP5: Math.round(p(totVals, 5)),
      totalMedian: Math.round(p(totVals, 50)),
      totalP95: Math.round(p(totVals, 95)),
    };
  });
  return results;
}

function computeBaselines(blValues, blDefaults) {
  const r = {};
  BOTTLENECKS.forEach(b => {
    const q = BASELINE_QUESTIONS.find(bq => bq.maps.includes(b.id));
    if (!q) { r[b.id] = b.defaultBaseline; return; }
    if (blDefaults[q.id]) { r[b.id] = b.defaultBaseline; return; }
    r[b.id] = Math.max(0, Math.min(80, Math.round(b.defaultBaseline * (blValues[q.id] / q.default))));
  });
  return r;
}

function DistributionSlider({ p5, median, p95, onChange, color = K.teal }) {
  const [dragging, setDragging] = useState(null);
  const barRef = useState(null);
  const getVal = (e, el) => {
    if (!el) return median;
    const rect = el.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(pct * 100);
  };
  const handleDown = (which) => (e) => { e.preventDefault(); setDragging(which); };
  const handleMove = (e) => {
    if (!dragging || !barRef[0]) return;
    const v = getVal(e, barRef[0]);
    if (dragging === "p5") onChange({ p5: Math.min(v, median - 1), median, p95 });
    else if (dragging === "median") onChange({ p5: Math.min(p5, v - 1), median: v, p95: Math.max(p95, v + 1) });
    else if (dragging === "p95") onChange({ p5, median, p95: Math.max(v, median + 1) });
  };
  const handleUp = () => setDragging(null);
  const thumbStyle = (val, which) => ({
    position: "absolute", left: val + "%", top: "50%", transform: "translate(-50%, -50%)",
    width: which === "median" ? 16 : 10, height: which === "median" ? 16 : 10, borderRadius: "50%",
    background: which === "median" ? color : K.card, border: "2px solid " + color, cursor: "grab",
    zIndex: which === "median" ? 3 : 2,
    boxShadow: dragging === which ? "0 0 0 4px " + K.ice : "0 1px 3px rgba(0,0,0,0.15)", touchAction: "none",
  });
  return (
    <div style={{ position: "relative", padding: "8px 0" }}>
      <div ref={el => { barRef[0] = el; }} onMouseMove={handleMove} onMouseUp={handleUp} onMouseLeave={handleUp}
        onTouchMove={handleMove} onTouchEnd={handleUp}
        style={{ position: "relative", height: 20, cursor: dragging ? "grabbing" : "default" }}>
        <div style={{ position: "absolute", top: "50%", left: 0, right: 0, height: 4, transform: "translateY(-50%)", background: K.track, borderRadius: 2 }} />
        <div style={{ position: "absolute", top: "50%", left: p5 + "%", width: (p95 - p5) + "%", height: 8, transform: "translateY(-50%)", background: "rgba(50,114,145,0.15)", borderRadius: 4 }} />
        <div style={{ position: "absolute", top: "50%", left: p5 + "%", width: (p95 - p5) + "%", height: 2, transform: "translateY(-50%)", background: color, opacity: 0.4 }} />
        <div onMouseDown={handleDown("p5")} onTouchStart={handleDown("p5")} style={thumbStyle(p5, "p5")} />
        <div onMouseDown={handleDown("median")} onTouchStart={handleDown("median")} style={thumbStyle(median, "median")} />
        <div onMouseDown={handleDown("p95")} onTouchStart={handleDown("p95")} style={thumbStyle(p95, "p95")} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 2 }}>
        <span style={{ fontSize: 10, color: K.textTertiary }}>5th: {p5}</span>
        <span style={{ fontSize: 11, fontWeight: 700, color: color }}>median: {median}</span>
        <span style={{ fontSize: 10, color: K.textTertiary }}>95th: {p95}</span>
      </div>
    </div>
  );
}

function OutputPanel({ baselines, mcResults, showUncertainty }) {
  const items = BOTTLENECKS.map(b => ({ ...b, bl: baselines[b.id], ...mcResults[b.id] }));
  const s1 = items.filter(i => i.stage === 1);
  const s2 = items.filter(i => i.stage === 2);
  const binding = [...items].sort((a, b) => a.totalMedian - b.totalMedian)[0];
  const bigAI = [...items].sort((a, b) => b.aiMedian - a.aiMedian)[0];
  const smallAI = [...items].sort((a, b) => a.aiMedian - b.aiMedian)[0];
  const widestUncertainty = [...items].sort((a, b) => (b.aiP95 - b.aiP5) - (a.aiP95 - a.aiP5))[0];

  const bars = (list, label) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: K.textSecondary, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>{label}</div>
      {list.map(item => {
        const blPct = item.bl;
        const aiMedPct = item.aiMedian;
        const totalMed = Math.min(100, blPct + aiMedPct);
        const totalP5 = Math.min(100, blPct + item.aiP5);
        const totalP95 = Math.min(100, blPct + item.aiP95);
        const isBind = item.id === binding.id;
        return (
          <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
            <span style={{ fontSize: 11, color: K.textSecondary, width: LABEL_WIDTH, minWidth: LABEL_WIDTH, textAlign: "right", lineHeight: 1.2 }}>{item.label}</span>
            <div style={{ flex: 1, position: "relative", height: 20 }}>
              <div style={{ position: "absolute", top: 2, left: 0, right: 0, height: 16, background: K.track, borderRadius: 3 }} />
              <div style={{ position: "absolute", top: 2, left: 0, width: blPct + "%", height: 16, background: K.baseline, borderRadius: "3px 0 0 3px", transition: "width 0.2s" }} />
              <div style={{ position: "absolute", top: 2, left: blPct + "%", width: aiMedPct + "%", height: 16, background: K.ai, transition: "width 0.2s" }} />
              {showUncertainty && (
                <>
                  <div style={{ position: "absolute", top: 6, left: totalP5 + "%", width: (totalP95 - totalP5) + "%", height: 8, background: K.rangeFill, borderRadius: 2 }} />
                  <div style={{ position: "absolute", top: 3, left: totalP5 + "%", width: 2, height: 14, background: K.rangeLo, borderRadius: 1 }} />
                  <div style={{ position: "absolute", top: 3, left: totalP95 + "%", width: 2, height: 14, background: K.rangeHi, borderRadius: 1 }} />
                </>
              )}
            </div>
            <span style={{ fontSize: 11, fontWeight: 700, minWidth: 72, color: isBind ? K.warn : K.textPrimary, textAlign: "right" }}>
              {totalMed}%{showUncertainty && <span style={{ fontWeight: 400, fontSize: 9, color: K.textTertiary }}>{" (" + totalP5 + "\u2013" + totalP95 + ")"}</span>}
            </span>
          </div>
        );
      })}
    </div>
  );

  return (
    <div style={{ background: K.card, border: "2px solid " + K.teal, borderRadius: 10, padding: "20px 20px 16px", marginBottom: 16, boxShadow: "0 2px 12px rgba(50,114,145,0.10)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
        <div style={{ width: 4, height: 22, background: K.teal, borderRadius: 2 }} />
        <div style={{ fontSize: 18, fontWeight: 800, color: K.teal }}>What your assumptions imply</div>
      </div>
      {bars(s1, "Technical and economic bottlenecks")}
      {bars(s2, "Non-technical bottlenecks")}
      <div style={{ display: "flex", gap: 14, marginTop: 4, marginBottom: 14, flexWrap: "wrap" }}>
        <span style={{ fontSize: 10, color: K.textTertiary, display: "flex", alignItems: "center", gap: 4 }}>
          <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: K.baseline }} /> Baseline</span>
        <span style={{ fontSize: 10, color: K.ai, display: "flex", alignItems: "center", gap: 4 }}>
          <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: K.ai }} /> AI contribution (median)</span>
        {showUncertainty && <>
          <span style={{ fontSize: 10, color: K.rangeLo, display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ display: "inline-block", width: 3, height: 10, borderRadius: 1, background: K.rangeLo }} /> 5th pctl</span>
          <span style={{ fontSize: 10, color: K.rangeHi, display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ display: "inline-block", width: 3, height: 10, borderRadius: 1, background: K.rangeHi }} /> 95th pctl</span>
        </>}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <div style={{ padding: "10px 12px", background: K.ice, borderRadius: 6 }}>
          <div style={{ fontSize: 10, color: K.teal, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 2 }}>AI helps most with</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: K.teal }}>{bigAI.label}</div>
          <div style={{ fontSize: 11, color: K.teal }}>+{bigAI.aiMedian}pp median{showUncertainty && " (" + bigAI.aiP5 + "\u2013" + bigAI.aiP95 + ")"}</div>
        </div>
        <div style={{ padding: "10px 12px", background: K.warnBg, borderRadius: 6 }}>
          <div style={{ fontSize: 10, color: K.warn, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 2 }}>Weakest link</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: K.warn }}>{binding.label}</div>
          <div style={{ fontSize: 11, color: K.warn }}>{binding.totalMedian}% total{showUncertainty && " (" + binding.totalP5 + "\u2013" + binding.totalP95 + ")"}</div>
        </div>
        {showUncertainty && (
          <div style={{ padding: "10px 12px", background: K.dropBg, borderRadius: 6 }}>
            <div style={{ fontSize: 10, color: K.textSecondary, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 2 }}>Widest uncertainty</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: K.textPrimary }}>{widestUncertainty.label}</div>
            <div style={{ fontSize: 11, color: K.textSecondary }}>+{widestUncertainty.aiP5} to +{widestUncertainty.aiP95}pp ({widestUncertainty.aiP95 - widestUncertainty.aiP5}pp spread)</div>
          </div>
        )}
        <div style={{ padding: "10px 12px", background: K.dropBg, borderRadius: 6 }}>
          <div style={{ fontSize: 10, color: K.textSecondary, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 2 }}>Least AI-tractable</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: K.textPrimary }}>{smallAI.label}</div>
          <div style={{ fontSize: 11, color: K.textSecondary }}>+{smallAI.aiMedian}pp median{smallAI.aiMedian <= 3 ? " \u2014 AI barely moves this" : ""}</div>
        </div>
        {!showUncertainty && (
          <div style={{ padding: "10px 12px", background: K.dropBg, borderRadius: 6 }}>
            <div style={{ fontSize: 10, color: K.textSecondary, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 2 }}>Binding constraint is</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: K.textPrimary }}>{binding.stage === 1 ? "Technical" : "Non-technical"}</div>
            <div style={{ fontSize: 11, color: K.textSecondary }}>{binding.label} at {binding.totalMedian}%</div>
          </div>
        )}
      </div>
    </div>
  );
}

function SensitivityMatrix({ sensitivities, onChange, onReset }) {
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 12, color: K.textSecondary, lineHeight: 1.5, maxWidth: 520 }}>
          Each cell determines how much a meta-slider affects a bottleneck. Edit any cell to change the model's mapping. Hover or tap a cell to see the causal reasoning.
        </div>
        <button onClick={onReset} style={{ fontSize: 11, color: K.teal, background: "none", border: "1px solid " + K.border, borderRadius: 4, padding: "4px 10px", cursor: "pointer", fontFamily: FONT }}>
          Reset to defaults
        </button>
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", fontSize: 11, borderCollapse: "collapse", color: K.textSecondary }}>
          <thead>
            <tr style={{ borderBottom: "1px solid " + K.border }}>
              <th style={{ textAlign: "left", padding: "6px 6px", fontWeight: 700, color: K.textPrimary, minWidth: 120 }}>Bottleneck</th>
              {META_IDS.map(m => (
                <th key={m} style={{ textAlign: "center", padding: "6px 4px", fontWeight: 700, color: K.textPrimary, minWidth: 70 }}>{META_LABELS[m]}</th>
              ))}
              <th style={{ textAlign: "center", padding: "6px 4px", fontWeight: 700, color: K.textTertiary, minWidth: 55 }}>Max AI</th>
            </tr>
          </thead>
          <tbody>
            {BOTTLENECKS.map(b => {
              const s = sensitivities[b.id];
              const maxP = Math.round(META_IDS.reduce((sum, m) => sum + (s[m] || 0), 0) * 100);
              return (
                <tr key={b.id} style={{ borderBottom: "1px solid " + K.dropBg }}>
                  <td style={{ padding: "5px 6px", fontWeight: 600, color: K.textPrimary }}>{b.label}</td>
                  {META_IDS.map(m => {
                    const v = s[m] || 0;
                    const note = SENSITIVITY_NOTES[b.id] && SENSITIVITY_NOTES[b.id][m];
                    const bg = v > 0.3 ? K.ice : v > 0.1 ? K.dropBg : "transparent";
                    return (
                      <td key={m} style={{ textAlign: "center", padding: "3px 2px" }} title={note || "No direct causal pathway identified"}>
                        <input type="number" min={0} max={1} step={0.05} value={v}
                          onChange={e => { const nv = Math.max(0, Math.min(1, parseFloat(e.target.value) || 0)); onChange(b.id, m, nv); }}
                          style={{ width: 48, textAlign: "center", padding: "3px 2px", border: "1px solid " + K.border,
                            borderRadius: 3, fontSize: 12, fontFamily: FONT, color: v > 0 ? K.teal : K.textTertiary,
                            background: bg, fontWeight: v > 0.2 ? 700 : 400 }} />
                      </td>
                    );
                  })}
                  <td style={{ textAlign: "center", padding: "5px 4px", fontWeight: 700, color: K.textTertiary }}>{maxP}pp</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ fontSize: 11, color: K.textTertiary, marginTop: 8 }}>
        "Max AI" shows the AI contribution when all four meta-sliders are at 100 (before scaling). Sensitivities fully determine AI's channels of impact. The scaling factor then controls whether those channels widen in high-capability worlds.
      </div>
    </div>
  );
}

function ScalingFactorControl({ value, onChange }) {
  return (
    <div style={{ ...SS.card, borderLeft: "3px solid " + K.cyan }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: K.textPrimary, marginBottom: 4 }}>Sensitivity scaling factor</div>
      <p style={{ fontSize: 12, color: K.textSecondary, margin: "0 0 10px 0", lineHeight: 1.55 }}>
        This captures a first-order question about AI: <strong style={{ color: K.textPrimary }}>does transformative AI open new channels of influence, or just push harder through existing ones?</strong>
      </p>
      <p style={{ fontSize: 12, color: K.textSecondary, margin: "0 0 10px 0", lineHeight: 1.55 }}>
        At 0, sensitivities are constant regardless of how capable AI is &mdash; a modest AI and a transformative AI affect bottlenecks through the same channels at the same strength; they differ only in how much capability flows through those channels. At higher values, sensitivities increase in high-capability worlds &mdash; meaning a transformative AI doesn't just push harder through existing channels, it opens wider ones.
      </p>
      <p style={{ fontSize: 12, color: K.textSecondary, margin: "0 0 12px 0", lineHeight: 1.55 }}>
        For example, at a scaling factor of 0.5, when a Monte Carlo draw samples AI capability at the 95th percentile, sensitivities are 50% higher than at the median. A sensitivity of 0.20 for regulatory approval becomes 0.30 in that draw &mdash; because in worlds where AI is truly transformative, it isn't just helping with dossier prep, it's changing how institutions make decisions.
      </p>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <Slider value={Math.round(value * 100)} onChange={v => onChange(v / 100)} min={0} max={200} color={K.cyan} />
        <span style={{ fontSize: 18, fontWeight: 700, color: K.teal, minWidth: 50, textAlign: "right" }}>{value.toFixed(2)}</span>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
        <span style={{ fontSize: 10, color: K.textTertiary }}>0 = channels stay fixed</span>
        <span style={{ fontSize: 10, color: K.textTertiary }}>1.0 = channels double at 95th pctl</span>
        <span style={{ fontSize: 10, color: K.textTertiary }}>2.0 = channels triple at 95th pctl</span>
      </div>
      <div style={{ fontSize: 11, color: K.textSecondary, marginTop: 10, padding: "8px 10px", background: K.dropBg, borderRadius: 4, lineHeight: 1.5 }}>
        <strong>How it works in the Monte Carlo:</strong> For each of the 1,000 draws, the model samples an AI capability value from your distribution. It then computes a multiplier: at the median draw, the multiplier is 1.0 (sensitivities are as you set them). At the 95th percentile draw, the multiplier is 1 + scaling factor. Below the median, the multiplier drops below 1 &mdash; channels narrow when AI is weak. The AI contribution for each bottleneck on that draw is then: sum of (sampled value &times; sensitivity &times; multiplier) across all four AI capability domains.
      </div>
    </div>
  );
}

function App() {
  const [blValues, setBlValues] = useState(Object.fromEntries(BASELINE_QUESTIONS.map(q => [q.id, q.default])));
  const [blDefaults, setBlDefaults] = useState(Object.fromEntries(BASELINE_QUESTIONS.map(q => [q.id, true])));
  const [aiDists, setAiDists] = useState(Object.fromEntries(AI_QUESTIONS.map(q => [q.id, { p5: q.defaultP5, median: q.defaultMedian, p95: q.defaultP95 }])));
  const [aiDefaults, setAiDefaults] = useState(Object.fromEntries(AI_QUESTIONS.map(q => [q.id, true])));
  const [sensitivities, setSensitivities] = useState(JSON.parse(JSON.stringify(DEFAULT_SENSITIVITIES)));
  const [scalingFactor, setScalingFactor] = useState(0.5);
  const [activePreset, setActivePreset] = useState("defaults");
  const [showMatrix, setShowMatrix] = useState(false);
  const [showUncertainty, setShowUncertainty] = useState(true);
  const [showScaling, setShowScaling] = useState(false);

  const handlePreset = useCallback(p => {
    setBlValues({ ...p.bl });
    setAiDists({ ...p.ai });
    setScalingFactor(p.scaling);
    setBlDefaults(Object.fromEntries(BASELINE_QUESTIONS.map(q => [q.id, true])));
    setAiDefaults(Object.fromEntries(AI_QUESTIONS.map(q => [q.id, false])));
    if (p.sens) setSensitivities(JSON.parse(JSON.stringify(p.sens)));
    else setSensitivities(JSON.parse(JSON.stringify(DEFAULT_SENSITIVITIES)));
    setActivePreset(p.id);
  }, []);

  const handleSensChange = useCallback((bId, mId, val) => {
    setSensitivities(prev => ({ ...prev, [bId]: { ...prev[bId], [mId]: val } }));
    setActivePreset(null);
  }, []);

  const handleAiDefaultToggle = useCallback((qId) => {
    setAiDefaults(prev => {
      const next = { ...prev, [qId]: !prev[qId] };
      if (next[qId]) {
        const q = AI_QUESTIONS.find(x => x.id === qId);
        setAiDists(pd => ({ ...pd, [qId]: { p5: q.defaultP5, median: q.defaultMedian, p95: q.defaultP95 } }));
      }
      return next;
    });
    setActivePreset(null);
  }, []);

  const baselines = useMemo(() => computeBaselines(blValues, blDefaults), [blValues, blDefaults]);
  const mcResults = useMemo(() => runMonteCarlo(aiDists, sensitivities, scalingFactor, baselines), [aiDists, sensitivities, scalingFactor, baselines]);

  return (
    <div style={{ fontFamily: FONT, background: K.bg, minHeight: "100vh", padding: "24px 16px", maxWidth: 820, margin: "0 auto" }}>

      <div style={{ background: K.warnBg, border: "1px solid " + K.gold, borderRadius: 6, padding: "10px 14px", marginBottom: 12, textAlign: "center" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: K.warn }}>Draft model, do not share, do not take strong conclusions away. All numbers subject to change.</div>
      </div>

      <div style={{ background: K.ice, border: "1px solid " + K.teal, borderRadius: 6, padding: "10px 14px", marginBottom: 16 }}>
        <div style={{ fontSize: 12, color: K.textPrimary, lineHeight: 1.55 }}>
          <strong style={{ color: K.teal }}>Guide for reviewers:</strong> please leave any comments about the model in the Google Doc of the report. I'm most interested in <strong>feedback about the usefulness and usability</strong>, and whether you <strong>agree with the sensitivity ratings</strong>.
        </div>
      </div>

      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: K.teal, fontWeight: 700, marginBottom: 6 }}>Interactive scenario model</div>
        <h1 style={{ fontSize: 26, fontWeight: 800, color: K.dark, margin: 0, lineHeight: 1.2 }}>What does AI actually change for cultivated meat?</h1>
        <p style={{ fontSize: 13, color: K.textSecondary, marginTop: 8, lineHeight: 1.55, maxWidth: 660 }}>
          Set your expectations for the world without AI (or use our defaults), then express your beliefs about AI's capabilities as distributions. The model runs 1,000 Monte Carlo draws through a sensitivity matrix (which you can inspect and edit), showing you how AI changes the bottlenecks and how uncertain that change is.
        </p>
      </div>

      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: K.textPrimary, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Preset scenarios</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {PRESETS.map(p => (
            <button key={p.id} onClick={() => handlePreset(p)}
              style={{ background: activePreset === p.id ? K.presetAct : K.presetBg,
                color: activePreset === p.id ? K.presetActTx : K.textPrimary,
                border: "1px solid " + (activePreset === p.id ? K.presetAct : K.border),
                borderRadius: 5, padding: "6px 10px", cursor: "pointer", textAlign: "left", fontFamily: FONT }}>
              <div style={{ fontSize: 12, fontWeight: 700 }}>{p.label}</div>
              <div style={{ fontSize: 10, opacity: activePreset === p.id ? 0.9 : 0.55 }}>{p.short}</div>
            </button>
          ))}
        </div>
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
        <Toggle checked={showUncertainty} onChange={() => setShowUncertainty(!showUncertainty)}
          label="Show uncertainty ranges" sublabel="(90% intervals from Monte Carlo)" />
        <Toggle checked={showMatrix} onChange={() => setShowMatrix(!showMatrix)}
          label="Edit sensitivity matrix" sublabel="(how AI beliefs map to bottlenecks)" />
        <Toggle checked={showScaling} onChange={() => setShowScaling(!showScaling)}
          label="Edit scaling factor" sublabel="(does stronger AI affect more bottlenecks, or just the same ones harder?)" />
      </div>

      <OutputPanel baselines={baselines} mcResults={mcResults} showUncertainty={showUncertainty} />

      {showScaling && (
        <ScalingFactorControl value={scalingFactor} onChange={v => { setScalingFactor(v); setActivePreset(null); }} />
      )}

      {showMatrix && (
        <div style={SS.card}>
          <div style={{ fontSize: 15, fontWeight: 700, color: K.textPrimary, marginBottom: 4 }}>Sensitivity matrix</div>
          <p style={{ fontSize: 12, color: K.textSecondary, margin: "0 0 10px 0", lineHeight: 1.55 }}>
            The matrix encodes which AI capabilities affect which bottlenecks, and how strongly. Our defaults are grounded in the evidence &mdash; but they encode our judgment, and you may disagree. Every cell is editable.
          </p>
          <p style={{ fontSize: 12, color: K.textSecondary, margin: "0 0 10px 0", lineHeight: 1.55 }}>
            A reader who thinks AI could transform consumer acceptance through hyper-personalised persuasion can increase the consumer behaviour &rarr; consumer acceptance sensitivity. A reader who thinks AI-driven science will make cultivated meat so good it sells itself can increase the science &rarr; consumer acceptance sensitivity. The model doesn't tell you which view is right &mdash; it shows you what each view implies.
          </p>
          <SensitivityMatrix sensitivities={sensitivities} onChange={handleSensChange}
            onReset={() => { setSensitivities(JSON.parse(JSON.stringify(DEFAULT_SENSITIVITIES))); }} />
        </div>
      )}

      <Collapsible title="The world without AI" defaultOpen={false}>
        <p style={{ fontSize: 12, color: K.textSecondary, margin: "0 0 14px 0", lineHeight: 1.5 }}>
          How much progress do you expect through conventional means alone? Our defaults are evidence-based. Uncheck to set your own.
        </p>
        {BASELINE_QUESTIONS.map(q => {
          const [showNote, setShowNote] = useState(false);
          return (
            <div key={q.id} style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: K.textPrimary, lineHeight: 1.4, marginBottom: 6 }}>{q.label}</div>
              <label style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontSize: 11, color: K.textSecondary, marginBottom: 4 }}>
                <input type="checkbox" checked={blDefaults[q.id]} onChange={() => { setBlDefaults(prev => ({ ...prev, [q.id]: !prev[q.id] })); setActivePreset(null); }}
                  style={{ accentColor: K.baseline, width: 13, height: 13 }} />
                Use our default ({q.default})
              </label>
              {!blDefaults[q.id] && (
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <Slider value={blValues[q.id]} onChange={v => { setBlValues(prev => ({ ...prev, [q.id]: v })); setActivePreset(null); }} color={K.baseline} />
                  <span style={{ fontSize: 16, fontWeight: 700, color: K.textSecondary, minWidth: 36, textAlign: "right" }}>{blValues[q.id]}</span>
                </div>
              )}
              <button onClick={() => setShowNote(!showNote)}
                style={{ background: "none", border: "none", padding: 0, cursor: "pointer", fontSize: 11, color: K.teal, textDecoration: "underline", marginTop: 3, fontFamily: FONT }}>
                {showNote ? "Hide reasoning \u25B4" : "Our reasoning \u25BE"}
              </button>
              {showNote && (
                <div style={{ marginTop: 4, padding: "6px 10px", background: K.dropBg, borderRadius: 4, fontSize: 12, color: K.textSecondary, lineHeight: 1.5, borderLeft: "3px solid " + K.aiLight }}>
                  {q.note}
                </div>
              )}
            </div>
          );
        })}
      </Collapsible>

      <div style={SS.card}>
        <div style={{ fontSize: 15, fontWeight: 700, color: K.textPrimary, marginBottom: 2 }}>What AI adds</div>
        <p style={{ fontSize: 12, color: K.textSecondary, margin: "0 0 6px 0", lineHeight: 1.55 }}>
          Express your beliefs about AI as distributions, not point estimates. For each domain, drag three handles: the 5th percentile (your pessimistic case), the median (your central expectation), and the 95th percentile (your optimistic tail).
        </p>
        <p style={{ fontSize: 12, color: K.textSecondary, margin: "0 0 14px 0", lineHeight: 1.55 }}>
          A reader who thinks "AI will probably not help much with consumer behaviour, but there's a small chance it transforms everything" would set a low median with a long right tail. This is fundamentally different from "AI will moderately help with consumer behaviour" &mdash; and the model preserves that distinction.
        </p>
        {AI_QUESTIONS.map(q => {
          const [showNote, setShowNote] = useState(false);
          const dist = aiDists[q.id];
          const isDefault = aiDefaults[q.id];
          const color = dist.median >= 60 ? K.teal : dist.median >= 30 ? K.mid : K.warn;
          return (
            <div key={q.id} style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: K.textPrimary, lineHeight: 1.4, marginBottom: 4 }}>{q.label}</div>
              <label style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontSize: 11, color: K.textSecondary, marginBottom: 4 }}>
                <input type="checkbox" checked={isDefault} onChange={() => handleAiDefaultToggle(q.id)}
                  style={{ accentColor: K.teal, width: 13, height: 13 }} />
                Use our default (5th: {q.defaultP5}, median: {q.defaultMedian}, 95th: {q.defaultP95})
              </label>
              {!isDefault && (
                <>
                  <DistributionSlider p5={dist.p5} median={dist.median} p95={dist.p95}
                    onChange={d => { setAiDists(prev => ({ ...prev, [q.id]: d })); setActivePreset(null); }} color={color} />
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 1 }}>
                    <span style={{ fontSize: 10, color: K.textTertiary }}>{q.lo}</span>
                    <span style={{ fontSize: 10, color: K.textTertiary }}>{q.hi}</span>
                  </div>
                  <div style={{ fontSize: 11, color: K.textSecondary, marginTop: 4, fontStyle: "italic" }}>
                    {dist.p95 - dist.median > (dist.median - dist.p5) * 2
                      ? "Right-skewed: you think the upside tail is much larger than the downside. Most draws cluster near the low end, but some worlds see transformative effects."
                      : dist.median - dist.p5 > (dist.p95 - dist.median) * 2
                        ? "Left-skewed: you think the downside risk is larger. Most draws are near the high end, but some worlds see AI fail to deliver."
                        : "Roughly symmetric around the median."}
                  </div>
                </>
              )}
              <button onClick={() => setShowNote(!showNote)}
                style={{ background: "none", border: "none", padding: 0, cursor: "pointer", fontSize: 11, color: K.teal, textDecoration: "underline", marginTop: 3, fontFamily: FONT }}>
                {showNote ? "Hide reasoning \u25B4" : "Our reasoning \u25BE"}
              </button>
              {showNote && (
                <div style={{ marginTop: 4, padding: "6px 10px", background: K.dropBg, borderRadius: 4, fontSize: 12, color: K.textSecondary, lineHeight: 1.5, borderLeft: "3px solid " + K.aiLight }}>
                  {q.note}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 8 }}>
        <Collapsible title="Bottleneck details and sources">
          <div style={{ fontSize: 12, color: K.textSecondary, lineHeight: 1.5 }}>
            {BOTTLENECKS.map(b => (
              <div key={b.id} style={{ marginBottom: 10, padding: "8px 12px", background: K.dropBg, borderRadius: 5, borderLeft: "3px solid " + K.aiLight }}>
                <div style={{ fontWeight: 700, color: K.textPrimary, marginBottom: 3 }}>{b.label}</div>
                <div style={{ marginBottom: 3 }}><strong>Baseline:</strong> {b.baselineNote}</div>
                <div style={{ marginBottom: 3 }}><strong>How AI helps:</strong> {b.aiNote}</div>
                <div style={{ fontSize: 11, color: K.textTertiary, fontStyle: "italic" }}>Sources: {b.sources}</div>
              </div>
            ))}
          </div>
        </Collapsible>

        <Collapsible title="Sensitivity matrix reasoning">
          <div style={{ fontSize: 12, color: K.textSecondary, lineHeight: 1.5 }}>
            <p style={{ margin: "0 0 10px 0" }}>Each nonzero cell in the sensitivity matrix represents a causal pathway from an AI capability to a bottleneck. Below is the reasoning for each connection in our default matrix. Our defaults encode our evidence-based view, but every cell is editable because the strength of these causal pathways is exactly the thing reasonable people disagree about.</p>
            {BOTTLENECKS.map(b => {
              const notes = SENSITIVITY_NOTES[b.id];
              if (!notes) return null;
              return (
                <div key={b.id} style={{ marginBottom: 10 }}>
                  <div style={{ fontWeight: 700, color: K.textPrimary, marginBottom: 3 }}>{b.label}</div>
                  {Object.entries(notes).map(([mId, note]) => (
                    <div key={mId} style={{ fontSize: 11, color: K.textSecondary, marginBottom: 2, paddingLeft: 12 }}>
                      <strong>{META_LABELS[mId]}</strong> ({DEFAULT_SENSITIVITIES[b.id][mId]}): {note}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </Collapsible>

        <Collapsible title="Methodology">
          <div style={{ fontSize: 12, lineHeight: 1.6, color: K.textSecondary }}>
            <p style={{ margin: "0 0 10px 0" }}><strong>Two-phase structure.</strong> The model separates "what happens without AI" (baseline) from "what AI adds." Readers set high-level beliefs about both. This decomposition makes AI's marginal contribution visible.</p>
            <p style={{ margin: "0 0 10px 0" }}><strong>Baselines.</strong> Four baseline meta-sliders map to ten bottlenecks. Each bottleneck has a default baseline (our evidence-based estimate). Adjusting a baseline slider scales mapped bottleneck baselines proportionally. Defaults can be kept via checkboxes.</p>
            <p style={{ margin: "0 0 10px 0" }}><strong>AI distributions.</strong> Instead of point estimates, each AI domain is expressed as a distribution with three parameters: the 5th percentile, the median, and the 95th percentile. This lets readers distinguish between "AI will moderately help" (narrow distribution around a moderate median) and "AI probably won't help much, but might transform everything" (low median, high 95th percentile). These are fundamentally different beliefs with different implications.</p>
            <p style={{ margin: "0 0 10px 0" }}><strong>Monte Carlo sampling.</strong> The model draws 1,000 samples from each AI distribution. For each draw, it computes AI contributions to every bottleneck through the sensitivity matrix. The output shows the 5th, median, and 95th percentile of the resulting distribution for each bottleneck &mdash; not just a point estimate, but a range that reflects your uncertainty.</p>
            <p style={{ margin: "0 0 10px 0" }}><strong>Sensitivity matrix.</strong> The matrix encodes which AI capabilities affect which bottlenecks and how strongly. Our defaults are grounded in the evidence, but every cell is editable. The strength of these causal pathways is exactly the thing reasonable people disagree about.</p>
            <p style={{ margin: "0 0 10px 0" }}><strong>Sensitivity scaling factor.</strong> This captures a crucial question: does transformative AI open new channels of influence, or just push harder through existing ones? At 0, sensitivities are constant regardless of AI capability level. At 0.5 (our default), sensitivities increase by 50% at the 95th percentile draw &mdash; meaning in worlds where AI is truly transformative, its channels of influence broaden, not just its magnitude. For example, a sensitivity of 0.20 for regulatory approval becomes 0.30 in a high-capability draw, because in that world AI isn't just helping with dossier prep &mdash; it's changing how institutions make decisions.</p>
            <p style={{ margin: "0 0 10px 0" }}><strong>What this model does not do.</strong> It does not produce a single probability of "success" or a timeline. It does not estimate animal welfare outcomes. It does not model the time dimension or discontinuous scenarios. Its purpose is to make visible how AI's contribution distributes across the bottlenecks to cultivated meat deployment, under the reader's own assumptions &mdash; including their uncertainty about those assumptions.</p>
            <div style={{ marginTop: 12, padding: "10px 14px", background: K.dropBg, borderRadius: 5, borderLeft: "3px solid " + K.border }}>
              <em style={{ fontSize: 11, color: K.textTertiary }}>Rethink Priorities, 2026. Draft for discussion. All assumptions are documented, inspectable, and editable.</em>
            </div>
          </div>
        </Collapsible>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
